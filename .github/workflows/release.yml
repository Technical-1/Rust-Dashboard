name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: ''
            bundles: 'deb,rpm'
            tauri_config: '{"build":{"beforeBuildCommand":""}}'
          - platform: macos-latest
            target: 'aarch64-apple-darwin'
            bundles: 'dmg'
            tauri_config: '{"build":{"beforeBuildCommand":""}}'
          - platform: macos-latest
            target: 'x86_64-apple-darwin'
            bundles: 'dmg'
            tauri_config: '{"build":{"beforeBuildCommand":""}}'
          - platform: windows-latest
            target: ''
            bundles: 'msi,nsis'
            tauri_config: '{"build":{"beforeBuildCommand":""},"bundle":{"icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.ico","icons/icon.png"]}}'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config '${{ matrix.tauri_config }}'
          else
            cargo tauri build --bundles ${{ matrix.bundles }} --config '${{ matrix.tauri_config }}'
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bundles-${{ matrix.platform }}-${{ matrix.target || 'default' }}
          path: |
            target/**/bundle/**/*.dmg
            target/**/bundle/**/*.app.tar.gz
            target/**/bundle/**/*.deb
            target/**/bundle/**/*.rpm
            target/**/bundle/**/*.msi
            target/**/bundle/**/*.exe
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Rust Dashboard ${{ github.ref_name }}'
          body: 'See the assets to download and install this version.'
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.msi
            artifacts/**/*.exe
